    <script>
        /* Your full name-canvas animation script stays exactly the same */
        const TEXT = "adrian zhang";
        const COLORS = ["#ff00ff", "#ffe600", "#00f5ff", "#c084fc"];
        const SYMBOLS = "!@#$%^&*<>?/\\|[]{}~`±§≠∆ø∑∏åß∂ƒ©√∫≈";
        const canvas = document.getElementById("name-canvas");
        const ctx = canvas.getContext("2d");
        let fontSize, displayChars = [];

        function setup() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight || 160;
            fontSize = Math.min(canvas.width * 0.11, 100);
        }
        function drawText(chars) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = `600 ${fontSize}px monospace`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            const totalWidth = ctx.measureText(TEXT).width;
            let x = canvas.width / 2 - totalWidth / 2;
            const y = canvas.height / 2;
            for (const ch of chars) {
                ctx.fillStyle = ch.color;
                ctx.fillText(ch.char, x + ctx.measureText(ch.char).width / 2, y);
                x += ctx.measureText(ch.char).width;
            }
        }
        function randomSymbol() { return SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]; }
        function randomColor() { return COLORS[Math.floor(Math.random() * COLORS.length)]; }
        function init() {
            setup();
            displayChars = TEXT.split("").map(ch => ({
                char: ch === " " ? " " : randomSymbol(),
                color: randomColor(),
                done: ch === " "
            }));
            // ... rest of your animation code (scramble + flicker) remains unchanged
            window.addEventListener("resize", init);
        }
        init();
    </script>
